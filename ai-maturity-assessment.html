<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Free AI Maturity Assessment - BigtechConsulting</title>
<meta name="description" content="Take BigtechConsulting free 8-minute AI Maturity Assessment. Get a personalised score across 5 dimensions and a custom action plan instantly."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--night:#080C18;--amber:#F0A028;--amberbg:#FDF4E3;--amberd:#7A4A08;--blue:#1847F0;--bluebg:#EBF0FF;--blued:#0F30C4;--chalk:#F6F6F2;--ink:#18202E;--muted:#5E6A88;--muted2:#98A2BA;--border:#E2E6F2;--green:#0B6E50;--greenbg:#E2F5EE;--r:10px;--rl:16px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;color:var(--ink);background:var(--chalk);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 40px;width:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-mark{width:34px;height:34px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;}
.nav-mark svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-brand{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--night);}
.nav-brand span{color:var(--blue);}
.nav-cta{background:var(--blue);color:#fff;padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;}
.wrap{max-width:720px;margin:0 auto;padding:88px 24px 48px;}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:32px;margin-bottom:16px;}
.opt{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:10px;background:#fff;transition:all .15s;}
.opt:hover,.opt.sel{border-color:var(--blue);background:var(--bluebg);}
.obadge{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
.opt.sel .obadge{background:var(--blue);border-color:var(--blue);color:#fff;}
.otext{font-size:14px;color:var(--ink);line-height:1.5;}
.ptrack{height:6px;background:var(--chalk);border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s;}
.ddot{height:4px;flex:1;border-radius:2px;background:var(--border);}
.ddot.active{background:var(--amber);}.ddot.done{background:var(--blue);}
.hidden{display:none;}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="/" class="nav-logo">
    <div class="nav-mark"><svg viewBox="0 0 20 20"><path d="M10 2L2 8l8 4 8-4-8-6z"/><path d="M2 14l8 4 8-4"/><path d="M2 11l8 4 8-4"/></svg></div>
    <span class="nav-brand">Bigtech<span>Consulting</span></span>
  </a>
  <a href="/#contact" class="nav-cta">Book a Call</a>
</div></nav>
<div class="wrap">
  <div id="intro">
    <div style="background:var(--night);border-radius:var(--rl);padding:48px;margin-bottom:20px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-120px;right:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(240,160,40,.07),transparent 70%);"></div>
      <div style="position:relative;z-index:1;">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:12px;">Free &middot; 8 Minutes &middot; Instant Results</div>
        <h1 style="font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1.08;margin-bottom:14px;">AI Maturity<br/>Assessment</h1>
        <p style="font-size:16px;color:rgba(255,255,255,.52);line-height:1.72;max-width:500px;margin-bottom:32px;">Answer 20 questions across 5 dimensions of AI transformation readiness. Get a personalised maturity score, gap analysis, and prioritised action plan instantly.</p>
        <div style="display:flex;gap:32px;margin-bottom:32px;flex-wrap:wrap;">
          <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;">20</div><div style="font-size:12px;color:rgba(255,255,255,.38);">Questions</div></div>
          <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;">5</div><div style="font-size:12px;color:rgba(255,255,255,.38);">Dimensions</div></div>
          <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;">8 min</div><div style="font-size:12px;color:rgba(255,255,255,.38);">Average</div></div>
        </div>
        <button onclick="startQuiz()" style="background:var(--amber);color:var(--night);padding:14px 28px;border-radius:var(--r);font-size:15px;font-weight:700;border:none;cursor:pointer;">Start Free Assessment &rarr;</button>
      </div>
    </div>
    <div class="card" id="dim-intro"></div>
  </div>
  <div id="quiz" class="hidden">
    <div class="card" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
        <span id="ql" style="font-size:13px;font-weight:600;color:var(--night);"></span>
        <span id="qp" style="font-size:13px;font-weight:700;color:var(--blue);"></span>
      </div>
      <div class="ptrack"><div class="pfill" id="pf" style="width:2%;"></div></div>
      <div style="display:flex;gap:6px;margin-top:10px;" id="dots"></div>
    </div>
    <div class="card">
      <div id="qdim" style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:4px;"></div>
      <div id="qsub" style="font-size:13px;color:var(--muted2);margin-bottom:18px;"></div>
      <h2 id="qtxt" style="font-family:'Syne',sans-serif;font-size:clamp(16px,2.5vw,21px);font-weight:800;color:var(--night);letter-spacing:-.4px;line-height:1.25;margin-bottom:24px;"></h2>
      <div id="opts"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;">
      <button id="bback" onclick="goPrev()" style="background:#fff;border:1.5px solid var(--border);color:var(--muted);padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;">&#8592; Back</button>
      <button id="bnext" onclick="goNext()" disabled style="background:var(--blue);color:#fff;padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;border:none;cursor:pointer;">Next &rarr;</button>
    </div>
  </div>
  <div id="results" class="hidden"></div>
</div>
<script>
const DIMS=[{id:"strategy",name:"AI Strategy & Leadership",color:"#1847F0"},{id:"data",name:"Data & Infrastructure",color:"#F0A028"},{id:"gov",name:"Governance & Ethics",color:"#6B2E8A"},{id:"talent",name:"Talent & Culture",color:"#0B6E50"},{id:"exec",name:"Execution & Operations",color:"#534AB7"}];
const QS=[
{d:"strategy",q:"How would you describe your organisation's AI strategy?",o:["No formal AI strategy yet","Some AI experiments but no unified strategy","Documented strategy but not fully resourced","Fully funded board-approved AI transformation roadmap"]},
{d:"strategy",q:"How visible is AI at your executive leadership level?",o:["Not regularly discussed","Comes up occasionally but not a strategic priority","On the executive agenda but no dedicated owner","Chief AI Officer with real board access"]},
{d:"strategy",q:"How do you identify and prioritise AI use cases?",o:["No structured process","Individual teams propose ideas no portfolio management","Use case review process but inconsistent prioritisation","Formal portfolio with ROI-based prioritisation"]},
{d:"strategy",q:"How would you rate your AI competitive positioning?",o:["Significantly behind industry peers","Roughly on par with industry peers","Ahead in specific areas but not broadly","Recognised as an AI leader in our industry"]},
{d:"data",q:"How would you describe the quality of your data assets?",o:["Siloed inconsistent and difficult to access","Some centralised data but quality is inconsistent","Data platform with reasonable quality but gaps","Comprehensive high-quality well-governed platform AI teams can access reliably"]},
{d:"data",q:"How mature is your data engineering and MLOps capability?",o:["Minimal data engineering capability","Small team but lack standardised processes","Established practices and some MLOps tooling","Production-grade MLOps with CI/CD for models monitoring and automated retraining"]},
{d:"data",q:"How do you manage AI model performance in production?",o:["No AI systems in production yet","Monitor manually and reactively","Some automated monitoring but incomplete coverage","Comprehensive automated monitoring drift detection and incident response"]},
{d:"data",q:"What is your approach to AI infrastructure costs?",o:["Do not track AI infrastructure costs","Aware of costs but do not actively optimise","Track costs and do periodic optimisation reviews","Dedicated AI FinOps practice with real-time visibility"]},
{d:"gov",q:"How mature is your AI governance framework?",o:["No AI-specific governance in place","Apply general IT governance to AI","AI governance policy exists but not consistently applied","Comprehensive AI governance with risk classification audit trails and ethics review"]},
{d:"gov",q:"How prepared are you for EU AI Act and AI regulations?",o:["Have not assessed regulatory exposure","Reviewed regulations but not started compliance","Completed gap analysis and have a roadmap","Active compliance programme with internal audits conducted"]},
{d:"gov",q:"How do you manage AI bias and fairness?",o:["No systematic approach to AI bias","Aware of risks but lack formal testing","Test for bias on high-risk systems inconsistently","Systematic bias testing applied to all AI systems with documented results"]},
{d:"gov",q:"How is AI security managed in your organisation?",o:["AI security not specifically addressed","Apply general cybersecurity controls to AI","Some AI-specific controls but gaps remain","Comprehensive AI security programme including prompt injection defence"]},
{d:"talent",q:"How would you describe your AI talent landscape?",o:["Very limited internal AI capability","Small team but significant skill gaps","Capable team but struggle to retain senior talent","Strong AI team with systematic development and retention"]},
{d:"talent",q:"How AI-literate is your broader workforce?",o:["Most employees have no practical AI skills","Some use AI tools but no systematic training","Training programmes but uneven adoption","Role-specific training with measurable adoption rates"]},
{d:"talent",q:"How would you describe your cultural attitude toward AI?",o:["Significant scepticism or fear about AI","Mixed enthusiasm in some areas resistance in others","Generally positive but adoption behaviour unchanged","AI-positive culture where employees actively use and advocate for AI"]},
{d:"talent",q:"How do you manage AI change management?",o:["No structured approach","Communicate about AI changes but do not measure adoption","Change management plans for major deployments","Systematic programme with adoption metrics champion networks and feedback loops"]},
{d:"exec",q:"How many AI systems do you currently have in production?",o:["None all at proof-of-concept stage","1 to 3 AI systems in production","4 to 10 AI systems across multiple business units","10+ AI systems actively maintained generating measurable value"]},
{d:"exec",q:"How do you measure the business impact of your AI initiatives?",o:["No systematic AI impact measurement","Track some metrics but not consistently","Defined KPIs for major initiatives reported regularly","Comprehensive value measurement with real-time dashboards"]},
{d:"exec",q:"How quickly can you go from AI idea to production deployment?",o:["No clear path from idea to deployment","12+ months from idea to production","3 to 6 months for typical use cases","4 to 8 weeks using standardised infrastructure and processes"]},
{d:"exec",q:"How does AI support your core business operations?",o:["AI not embedded in core operations","Used in isolated pockets not integrated into core workflows","Supports several core workflows but significant gaps","AI deeply embedded across functions backed by an autonomous business platform"]},
];
const LEVELS=[{min:0,max:24,level:"Level 1 - AI Aware",color:"#E24B4A",desc:"You understand AI is important but have not built foundations for systematic transformation. The opportunity cost of delay is growing daily."},{min:25,max:44,level:"Level 2 - AI Active",color:"#F0A028",desc:"You have started your AI journey. The challenge is moving from isolated wins to systematic organisation-wide capability."},{min:45,max:64,level:"Level 3 - AI Capable",color:"#1847F0",desc:"You have meaningful AI capability. The gap to leaders is in scale governance maturity and speed of execution."},{min:65,max:79,level:"Level 4 - AI Advanced",color:"#0B6E50",desc:"You are in the top quartile of AI maturity. Focus on compound value - AI capabilities that reinforce each other and create defensible advantage."},{min:80,max:100,level:"Level 5 - AI Native",color:"#534AB7",desc:"You are operating at the frontier of enterprise AI maturity. Sustaining this position requires continuous innovation."}];
const HINTS={strategy:{low:"Define a formal AI strategy and appoint a single executive owner before your next fiscal planning cycle.",mid:"Strengthen your AI use case portfolio process and connect strategy to measurable business outcomes.",high:"Extend your advantage by focusing on agentic platforms and compound AI capabilities."},data:{low:"Prioritise data quality and accessibility - AI is only as good as the data it operates on.",mid:"Build toward production-grade MLOps infrastructure. Manual processes become bottlenecks at scale.",high:"Implement AI FinOps practices to sustain cost efficiency as your AI portfolio grows."},gov:{low:"EU AI Act enforcement is live. Start with a risk classification of your existing AI portfolio immediately.",mid:"Systematise bias testing and AI security controls. Inconsistent coverage creates unpredictable regulatory exposure.",high:"Publish your AI ethics framework externally - a competitive differentiator for enterprise sales and talent."},talent:{low:"Invest in organisation-wide AI literacy before deploying tools. Adoption without capability leads to unused licences.",mid:"Build an AI champions network. Peer influence is more effective than top-down mandates for behavioural change.",high:"Systematise AI talent development to reduce dependency on external hiring in a constrained market."},exec:{low:"Get one AI system to production with measurable business impact. One real result is worth 100 PoC demonstrations.",mid:"Standardise your path from idea to deployment. Every week of unnecessary time is competitive disadvantage.",high:"Invest in agentic platform capabilities - the next wave of AI value comes from systems that operate autonomously."}};
let cur=0,ans=new Array(20).fill(null);
const di=document.getElementById("dim-intro");
DIMS.forEach(d=>{di.innerHTML+=`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);"><div style="width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0;"></div><span style="font-size:14px;color:var(--ink);">${d.name}</span></div>`;});
function startQuiz(){document.getElementById("intro").className="hidden";document.getElementById("quiz").className="";renderQ();}
function renderQ(){
  const q=QS[cur],di=DIMS.findIndex(d=>d.id===q.d),pct=Math.round((cur/20)*100);
  document.getElementById("ql").textContent="Question "+(cur+1)+" of 20";
  document.getElementById("qp").textContent=pct+"%";
  document.getElementById("pf").style.width=Math.max(2,pct)+"%";
  document.getElementById("qdim").textContent=DIMS[di].name;
  document.getElementById("qsub").textContent="Question "+(cur+1)+" of 20";
  document.getElementById("qtxt").textContent=q.q;
  const dd=document.getElementById("dots");dd.innerHTML="";
  DIMS.forEach((d,i)=>{const s=i*4,e=s+4,cls=cur>=e?"done":cur>=s?"active":"";dd.innerHTML+=`<div class="ddot ${cls}" style="${cls==="done"?"background:"+d.color+";":cls==="active"?"background:var(--amber);":""}"></div>`;});
  const oc=document.getElementById("opts");oc.innerHTML="";
  q.o.forEach((opt,i)=>{const sel=ans[cur]===i,div=document.createElement("div");div.className="opt"+(sel?" sel":"");div.innerHTML=`<div class="obadge">${i+1}</div><div class="otext">${opt}</div>`;div.onclick=()=>selOpt(i);oc.appendChild(div);});
  document.getElementById("bback").style.visibility=cur===0?"hidden":"visible";
  const nb=document.getElementById("bnext");nb.disabled=ans[cur]===null;
  nb.textContent=cur===19?"See My Results":"Next";nb.style.background=cur===19?"var(--amber)":"var(--blue)";nb.style.color=cur===19?"var(--night)":"#fff";
}
function selOpt(i){ans[cur]=i;document.querySelectorAll(".opt").forEach((el,j)=>{el.className="opt"+(j===i?" sel":"");});document.getElementById("bnext").disabled=false;}
function goNext(){if(ans[cur]===null)return;if(cur===19){showRes();return;}cur++;renderQ();}
function goPrev(){if(cur>0){cur--;renderQ();}}
function showRes(){
  document.getElementById("quiz").className="hidden";
  const rs=document.getElementById("results");rs.className="";
  const ds={};DIMS.forEach(d=>{ds[d.id]={t:0,c:0};});
  QS.forEach((q,i)=>{if(ans[i]!==null){ds[q.d].t+=ans[i]+1;ds[q.d].c++;}});
  const dn={};DIMS.forEach(d=>{const{t,c}=ds[d.id];dn[d.id]=c>0?Math.round((t/(c*4))*20):0;});
  const tot=Object.values(dn).reduce((a,b)=>a+b,0);
  const lv=LEVELS.find(l=>tot>=l.min&&tot<=l.max)||LEVELS[0];
  const dc=DIMS.map(d=>{const sc=dn[d.id],p=Math.round((sc/20)*100),tier=p<40?"low":p<70?"mid":"high",bc=p<40?"#E24B4A":p<70?"#F0A028":"#0B6E50";return`<div style="background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:20px;"><div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="font-size:13px;font-weight:700;color:var(--night);">${d.name}</span><span style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${d.color};">${sc}/20</span></div><div style="height:4px;background:var(--chalk);border-radius:2px;overflow:hidden;margin-bottom:8px;"><div style="height:100%;width:${p}%;background:${bc};border-radius:2px;"></div></div><p style="font-size:12px;color:var(--muted);line-height:1.5;">${HINTS[d.id][tier]}</p></div>`;}).join("");
  const sorted=[...DIMS].sort((a,b)=>dn[a.id]-dn[b.id]);
  const rc=sorted.map((d,rank)=>{const sc=dn[d.id],p=Math.round((sc/20)*100),tier=p<40?"low":p<70?"mid":"high",pr=rank<2?{l:"NOW",bg:"#FCEBEB",c:"#A32D2D"}:rank<4?{l:"NEXT",bg:"var(--amberbg)",c:"var(--amberd)"}:{l:"LATER",bg:"var(--greenbg)",c:"var(--green)"};return`<div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);"><div style="width:44px;height:36px;border-radius:8px;background:${pr.bg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${pr.c};flex-shrink:0;">${pr.l}</div><div><div style="font-size:14px;font-weight:700;color:var(--night);margin-bottom:3px;">${d.name} - ${sc}/20</div><div style="font-size:13px;color:var(--muted);line-height:1.55;">${HINTS[d.id][tier]}</div></div></div>`;}).join("");
  rs.innerHTML=`<div style="background:var(--night);border-radius:var(--rl);padding:44px;text-align:center;margin-bottom:20px;"><div style="width:110px;height:110px;border-radius:50%;border:4px solid ${lv.color};display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;"><div style="font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:#fff;line-height:1;">${tot}</div><div style="font-size:12px;color:rgba(255,255,255,.38);">/100</div></div><div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:${lv.color};margin-bottom:8px;">${lv.level}</div><p style="font-size:15px;color:rgba(255,255,255,.5);max-width:480px;margin:0 auto;line-height:1.7;">${lv.desc}</p></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;">${dc}</div><div style="background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:32px;margin-bottom:20px;"><h3 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--night);margin-bottom:20px;">Your Prioritised Action Plan</h3>${rc}</div><div style="background:var(--blue);border-radius:var(--rl);padding:36px;text-align:center;"><h3 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;margin-bottom:10px;">Ready to move to the next level?</h3><p style="font-size:14px;color:rgba(255,255,255,.65);margin-bottom:22px;">BigtechConsulting can build a custom transformation roadmap based on your results.</p><div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;"><a href="/#contact" style="background:#fff;color:var(--blue);padding:13px 22px;border-radius:var(--r);font-size:14px;font-weight:700;">Book a Free Strategy Call</a><a href="https://startupsinabox.com" target="_blank" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:13px 22px;border-radius:var(--r);font-size:14px;font-weight:600;">Explore SIXXAB AI</a></div></div>`;
}
</script>
</body></html>
