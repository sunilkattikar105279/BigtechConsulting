<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Free AI Maturity Assessment &#8212; BigtechConsulting</title>
<meta name="description" content="Free 8-minute AI Maturity Assessment. Personalised score across 5 dimensions and a custom action plan instantly."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --charcoal:#1C1917; --charcoal2:#292524; --charcoal3:#44403C;
  --teal:#0D9488; --teal2:#14B8A6; --tealbg:#F0FDFA; --teald:#0F766E;
  --amber:#F59E0B; --amberbg:#FFFBEB; --amberd:#B45309;
  --cream:#FAFAF9; --cream2:#F5F5F4; --white:#FFFFFF;
  --stone:#78716C; --stone2:#A8A29E; --stone3:#D6D3D1;
  --border:#E7E5E4; --green:#059669; --greenbg:#ECFDF5;
  --red:#DC2626; --redbg:#FEF2F2;
  --r:8px; --rl:14px;
  --sh:0 1px 3px rgba(0,0,0,.05),0 4px 20px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Manrope',sans-serif;font-size:15px;line-height:1.7;color:var(--charcoal);background:var(--white);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);}
.nav-in{max-width:1160px;margin:0 auto;padding:0 48px;height:100%;
  display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;background:var(--teal);border-radius:8px;
  display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;}
.logo-text{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;
  color:var(--charcoal);letter-spacing:-.2px;}
.logo-text span{color:var(--teal);}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
.nav-links a{font-size:14px;font-weight:500;color:var(--stone);transition:color .15s;}
.nav-links a:hover{color:var(--charcoal);}
.nav-btn{background:var(--teal);color:#fff;padding:10px 22px;border-radius:var(--r);
  font-size:14px;font-weight:600;transition:background .15s;}
.nav-btn:hover{background:var(--teald);}

/* LAYOUT */
.wrap{max-width:1160px;margin:0 auto;padding:0 48px;}
.sec{padding:96px 0;}
.sec-sm{padding:64px 0;}

/* TYPE */
.ov{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:var(--teal);
  display:inline-block;margin-bottom:12px;}
.ov-amber{color:var(--amberd);}
.ov-stone{color:var(--stone);}
.d1{font-family:'Playfair Display',serif;font-weight:700;
  font-size:clamp(42px,5.5vw,72px);line-height:1.06;letter-spacing:-.5px;
  color:var(--charcoal);}
.d1 em{font-style:italic;color:var(--teal);}
.d2{font-family:'Playfair Display',serif;font-weight:600;
  font-size:clamp(28px,3vw,44px);line-height:1.15;letter-spacing:-.3px;
  color:var(--charcoal);}
.d2 em{font-style:italic;color:var(--teal);}
.d2-wh{color:#fff!important;}
.d2-wh em{color:var(--teal2)!important;}
.d3{font-family:'Playfair Display',serif;font-weight:600;font-size:22px;
  line-height:1.3;color:var(--charcoal);margin-bottom:8px;}
.body-lg{font-size:17px;color:var(--stone);line-height:1.76;}
.lead{font-size:18px;color:var(--stone);line-height:1.76;max-width:580px;}

/* BUTTONS */
.bt{display:inline-block;font-size:15px;font-weight:600;
  padding:13px 26px;border-radius:var(--r);transition:all .15s;}
.bt-teal{background:var(--teal);color:#fff;}
.bt-teal:hover{background:var(--teald);}
.bt-out{border:1.5px solid var(--border);color:var(--charcoal);background:#fff;}
.bt-out:hover{border-color:var(--teal);color:var(--teal);}
.bt-white{background:#fff;color:var(--teal);}
.bt-white:hover{background:var(--cream);}
.bt-amber{background:var(--amber);color:#fff;}
.bt-amber:hover{filter:brightness(1.06);}

/* HERO */
.hero{padding:156px 0 96px;background:linear-gradient(150deg,#fff 55%,#F0FDFA 100%);
  overflow:hidden;position:relative;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;
  background:var(--tealbg);border:1px solid #99F6E4;border-radius:40px;
  padding:6px 16px;font-size:12px;font-weight:600;color:var(--teald);margin-bottom:26px;}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;}
.hero-act{display:flex;align-items:center;gap:14px;margin-top:40px;flex-wrap:wrap;}
.stat-row{display:flex;gap:52px;flex-wrap:wrap;
  padding-top:44px;margin-top:52px;border-top:1px solid var(--border);}
.stat-v{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;
  color:var(--charcoal);line-height:1;}
.stat-v em{font-style:normal;color:var(--teal);}
.stat-l{font-size:13px;color:var(--stone2);margin-top:4px;}

/* MARQUEE */
.mq{overflow:hidden;background:var(--cream2);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:16px 0;}
.mq-tr{display:flex;gap:60px;animation:mq 30s linear infinite;}
.mq-it{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  color:var(--stone2);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
@keyframes mq{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* CARDS */
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:24px;}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);
  padding:28px;transition:border-color .2s,box-shadow .2s;}
.card:hover{border-color:var(--teal);box-shadow:var(--sh);}
.ci{width:44px;height:44px;border-radius:10px;background:var(--tealbg);
  display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.ci svg{width:20px;height:20px;stroke:var(--teal);fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ci.am{background:var(--amberbg);}
.ci.am svg{stroke:var(--amberd);}
.ci.gr{background:var(--greenbg);}
.ci.gr svg{stroke:var(--green);}
.ci.st{background:var(--cream2);}
.ci.st svg{stroke:var(--charcoal3);}
.card h3{font-size:16px;font-weight:700;color:var(--charcoal);margin-bottom:7px;}
.card p{font-size:13px;color:var(--stone);line-height:1.65;}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;
  border-radius:20px;margin-top:12px;}
.tg-teal{background:var(--tealbg);color:var(--teald);}
.tg-amb{background:var(--amberbg);color:var(--amberd);}
.tg-grn{background:var(--greenbg);color:var(--green);}
.tg-st{background:var(--cream2);color:var(--charcoal3);}

/* SECTIONS */
.dk{background:var(--charcoal);}
.lt{background:var(--cream);}

/* VERTICALS */
.vg{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:10px;}
.vp{border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:14px 18px;
  display:flex;align-items:center;gap:10px;transition:background .2s;}
.vp:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.22);}
.vdot{width:6px;height:6px;border-radius:50%;background:var(--teal2);flex-shrink:0;}
.vp span{font-size:13px;font-weight:500;color:rgba(255,255,255,.8);}

/* APPROACH */
.step{display:flex;gap:20px;padding:24px 0;border-bottom:1px solid var(--border);}
.step:last-child{border-bottom:none;}
.sn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  color:var(--teal);min-width:30px;padding-top:2px;}
.sb h4{font-size:16px;font-weight:700;color:var(--charcoal);margin-bottom:5px;}
.sb p{font-size:14px;color:var(--stone);line-height:1.65;}

/* WHY */
.wg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;}
.wc{border-radius:var(--rl);padding:28px;}
.wc.wt{background:var(--tealbg);}
.wc.wd{background:var(--charcoal);}
.wc.wa{background:var(--amberbg);}
.wc.wl{background:var(--cream2);border:1px solid var(--border);}
.wc.wg2{background:var(--greenbg);}
.wn{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;
  letter-spacing:-1px;margin-bottom:6px;line-height:1;}
.wc.wt .wn{color:var(--teal);}
.wc.wd .wn{color:#fff;}
.wc.wa .wn{color:var(--amber);}
.wc.wl .wn{color:var(--charcoal);}
.wc.wg2 .wn{color:var(--green);}
.wc h4{font-size:15px;font-weight:700;margin-bottom:5px;}
.wc.wd h4,.wc.wd p{color:#fff;}
.wc.wd p{color:rgba(255,255,255,.55)!important;}
.wc p{font-size:13px;color:var(--stone);line-height:1.6;}

/* TESTIMONIALS */
.tc{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:28px;}
.tc-stars{color:var(--amber);font-size:14px;margin-bottom:12px;}
.tc-q{font-size:15px;color:var(--charcoal);line-height:1.75;font-style:italic;margin-bottom:20px;}
.tc-au{display:flex;align-items:center;gap:12px;}
.av{width:38px;height:38px;border-radius:50%;background:var(--tealbg);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--teald);flex-shrink:0;}
.an{font-size:14px;font-weight:600;color:var(--charcoal);}
.ar{font-size:12px;color:var(--stone2);}

/* PHASES */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r);padding:18px;}
.pn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  color:var(--teal2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.pm{font-size:14px;font-weight:600;color:#fff;}

/* CTA BAND */
.cb{background:var(--teal);}
.cbi{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}

/* CONTACT */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;}
.cf{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:36px;}
.cf h3{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;
  color:var(--charcoal);margin-bottom:24px;}
.fg{margin-bottom:18px;}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:var(--r);
  font-size:14px;font-family:'Manrope',sans-serif;color:var(--charcoal);
  background:#fff;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--teal);}
.fg textarea{resize:vertical;min-height:90px;}
.fsub{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;
  border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;
  font-family:'Manrope',sans-serif;transition:background .15s;}
.fsub:hover{background:var(--teald);}
.fnote{font-size:12px;color:var(--stone2);margin-top:10px;text-align:center;}
.fsuc{display:none;text-align:center;padding:32px 0;}
.fsuc h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--charcoal);margin-bottom:8px;}
.fsuc p{font-size:15px;color:var(--stone);}
.ci-wrap h3{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;
  color:#fff;margin-bottom:14px;}
.ci-wrap p{font-size:15px;color:rgba(255,255,255,.58);line-height:1.75;margin-bottom:24px;}
.cd{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.cd svg{width:18px;height:18px;stroke:var(--teal2);fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.cd span{font-size:14px;color:rgba(255,255,255,.7);}

/* BLOG */
.bc{display:block;background:#fff;border:1px solid var(--border);
  border-radius:var(--rl);padding:28px;transition:border-color .2s,box-shadow .2s;}
.bc:hover{border-color:var(--teal);box-shadow:var(--sh);}
.bcat{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  display:inline-block;margin-bottom:10px;}
.bs{background:var(--tealbg);color:var(--teald);}
.be{background:#EEF2FF;color:#4338CA;}
.bp{background:var(--amberbg);color:var(--amberd);}
.bg2{background:#F5F3FF;color:#6D28D9;}
.bo{background:var(--greenbg);color:var(--green);}
.bsec{background:var(--redbg);color:var(--red);}
.bdate{font-size:12px;color:var(--stone2);margin-bottom:8px;}
.bc h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;
  color:var(--charcoal);line-height:1.35;margin-bottom:8px;}
.bc p{font-size:13px;color:var(--stone);line-height:1.65;}
.rm{font-size:13px;font-weight:600;color:var(--teal);margin-top:12px;display:inline-block;}

/* ARTICLE */
.ab h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;
  color:var(--charcoal);margin:40px 0 12px;}
.ab p{font-size:16px;color:#3C3A37;line-height:1.82;margin-bottom:18px;}
.ab blockquote{border-left:3px solid var(--teal);padding:16px 20px;
  background:var(--tealbg);border-radius:0 var(--r) var(--r) 0;margin:28px 0;}
.ab blockquote p{font-size:17px;color:var(--teald);font-weight:500;
  margin-bottom:0;font-style:italic;}
.ab ul{margin:0 0 20px 22px;display:flex;flex-direction:column;gap:8px;}
.ab ul li{font-size:15px;color:#3C3A37;line-height:1.7;}
.ab a{color:var(--teal);font-weight:600;}

/* BREADCRUMB */
.bc-nav{display:flex;align-items:center;gap:8px;font-size:13px;
  color:var(--stone2);margin-bottom:20px;flex-wrap:wrap;}
.bc-nav a{color:var(--stone2);transition:color .15s;}
.bc-nav a:hover{color:var(--teal);}
.bc-nav span.sep{color:var(--stone3);}

/* ASSESSMENT */
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;
  border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;
  margin-bottom:9px;background:#fff;transition:all .15s;}
.opt:hover,.opt.sel{border-color:var(--teal);background:var(--tealbg);}
.onum{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  font-weight:600;color:var(--stone);flex-shrink:0;transition:all .15s;}
.opt.sel .onum{background:var(--teal);border-color:var(--teal);color:#fff;}
.otxt{font-size:14px;color:var(--charcoal);line-height:1.5;}
.pb2{height:6px;background:var(--cream2);border-radius:3px;overflow:hidden;}
.pf{height:100%;background:var(--teal);border-radius:3px;transition:width .4s;}
.dp{height:4px;flex:1;border-radius:2px;background:var(--border);}
.dp.act{background:var(--amber);}
.dp.dn{background:var(--teal);}

/* FOOTER */
.footer{background:var(--charcoal);padding:60px 0 28px;}
.fg2{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:44px;margin-bottom:44px;}
.fb p{font-size:13px;color:rgba(255,255,255,.38);margin-top:14px;
  max-width:260px;line-height:1.7;}
.fc h5{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.3);margin-bottom:14px;}
.fc a{display:block;font-size:13px;color:rgba(255,255,255,.42);margin-bottom:9px;transition:color .15s;}
.fc a:hover{color:#fff;}
.fbot{border-top:1px solid rgba(255,255,255,.08);padding-top:22px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.fbot p{font-size:12px;color:rgba(255,255,255,.25);}
.flogo{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#fff;}
.flogo span{color:var(--teal);}
.hidden{display:none!important;}

@media(max-width:900px){.cg{grid-template-columns:1fr;}}
@media(max-width:768px){
  .wrap{padding:0 22px;}
  .sec{padding:64px 0;}
  .nav-in{padding:0 22px;}
  .nav-links{display:none;}
  .hero{padding:118px 0 64px;background:#fff;}
  .fg2{grid-template-columns:1fr 1fr;}
  .cbi{flex-direction:column;align-items:flex-start;}
  .pg{grid-template-columns:1fr;}
}
</style>
</head>

      <span id="ql" style="font-size:13px;font-weight:600;color:var(--charcoal);"></span>
      <span id="qp" style="font-size:13px;font-weight:600;color:var(--teal);"></span>

    <div id="qdim" style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;"></div>
    <div id="qsub" style="font-size:13px;color:var(--stone2);margin-bottom:16px;"></div>
    <h2 id="qtxt" style="font-family:'Playfair Display',serif;font-size:clamp(18px,2.8vw,24px);font-weight:600;color:var(--charcoal);line-height:1.3;margin-bottom:24px;"></h2>
    <div id="opts"></div>
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:12px;">
    <button id="bk" onclick="goPrev()" style="background:#fff;border:1.5px solid var(--border);color:var(--stone);padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif;">&#8592; Back</button>
    <button id="nx" onclick="goNext()" disabled style="background:var(--teal);color:#fff;padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:'Manrope',sans-serif;">Next &#8594;</button>
  </div>
</div>

<div id="results" class="hidden"></div>
</div>
</div>

<script>
const D=[
  {id:"strategy",name:"AI Strategy & Leadership",c:"#0D9488"},
  {id:"data",    name:"Data & Infrastructure",   c:"#1C1917"},
  {id:"gov",     name:"Governance & Ethics",     c:"#7C3AED"},
  {id:"talent",  name:"Talent & Culture",        c:"#059669"},
  {id:"exec",    name:"Execution & Operations",  c:"#2563EB"},
];
const Q=[
  {d:"strategy",q:"How would you describe your organisation's AI strategy?",o:["No formal AI strategy yet","Some AI experiments but no unified strategy","Documented strategy but not fully resourced","Fully funded board-approved AI transformation roadmap"]},
  {d:"strategy",q:"How visible is AI at your executive leadership level?",o:["Not regularly discussed","Comes up occasionally but not strategic","On the agenda but no dedicated owner","Chief AI Officer with real board access"]},
  {d:"strategy",q:"How do you identify and prioritise AI use cases?",o:["No structured process","Individual teams propose ideas, no portfolio management","Review process but inconsistent prioritisation","Formal portfolio with ROI-based prioritisation"]},
  {d:"strategy",q:"How would you rate your AI competitive positioning?",o:["Significantly behind industry peers","Roughly on par with industry peers","Ahead in specific areas but not broadly","Recognised as an AI leader in our industry"]},
  {d:"data",q:"How would you describe the quality of your data assets?",o:["Siloed, inconsistent, and difficult to access","Some centralised data but quality is inconsistent","Data platform with reasonable quality but gaps","Comprehensive high-quality well-governed platform AI teams can access reliably"]},
  {d:"data",q:"How mature is your data engineering and MLOps capability?",o:["Minimal data engineering capability","Small team but lack standardised processes","Established practices and some MLOps tooling","Production-grade MLOps with CI/CD, monitoring, and automated retraining"]},
  {d:"data",q:"How do you manage AI model performance in production?",o:["No AI systems in production yet","Monitor manually and reactively","Some automated monitoring but incomplete","Comprehensive automated monitoring, drift detection, and incident response"]},
  {d:"data",q:"What is your approach to AI infrastructure costs?",o:["Do not track AI infrastructure costs","Aware of costs but do not optimise","Track costs and do periodic reviews","Dedicated AI FinOps practice with real-time visibility"]},
  {d:"gov",q:"How mature is your AI governance framework?",o:["No AI-specific governance in place","Apply general IT governance to AI","AI governance policy exists but not consistently applied","Comprehensive AI governance with risk classification, audit trails, and ethics review"]},
  {d:"gov",q:"How prepared are you for EU AI Act and AI regulations?",o:["Have not assessed regulatory exposure","Reviewed regulations but not started compliance","Completed gap analysis and have a roadmap","Active compliance programme with internal audits"]},
  {d:"gov",q:"How do you manage AI bias and fairness?",o:["No systematic approach","Aware of risks but lack formal testing","Test for bias on high-risk systems inconsistently","Systematic testing applied to all AI systems with documented results"]},
  {d:"gov",q:"How is AI security managed in your organisation?",o:["Not specifically addressed","Apply general cybersecurity controls","Some AI-specific controls but gaps remain","Comprehensive AI security including prompt injection defence"]},
  {d:"talent",q:"How would you describe your AI talent landscape?",o:["Very limited internal AI capability","Small team but significant skill gaps","Capable team but struggle to retain senior talent","Strong AI team with systematic development and retention"]},
  {d:"talent",q:"How AI-literate is your broader workforce?",o:["Most employees have no practical AI skills","Some use AI tools but no systematic training","Training programmes but uneven adoption","Role-specific training with measurable adoption rates"]},
  {d:"talent",q:"How would you describe your cultural attitude toward AI?",o:["Significant scepticism or fear","Mixed — enthusiasm in some areas, resistance in others","Generally positive but adoption behaviour unchanged","AI-positive culture where employees actively use and advocate for AI"]},
  {d:"talent",q:"How do you manage AI change management?",o:["No structured approach","Communicate about changes but do not measure adoption","Change management plans for major deployments","Systematic programme with adoption metrics, champion networks, and feedback loops"]},
  {d:"exec",q:"How many AI systems do you currently have in production?",o:["None — all at proof-of-concept stage","1 to 3 AI systems in production","4 to 10 AI systems across multiple business units","10+ AI systems actively maintained and generating measurable value"]},
  {d:"exec",q:"How do you measure the business impact of your AI initiatives?",o:["No systematic measurement","Track some metrics but not consistently","Defined KPIs for major initiatives reported regularly","Comprehensive measurement with real-time dashboards"]},
  {d:"exec",q:"How quickly can you go from AI idea to production?",o:["No clear path from idea to deployment","12+ months from idea to production","3 to 6 months for typical use cases","4 to 8 weeks using standardised infrastructure"]},
  {d:"exec",q:"How does AI support your core business operations?",o:["AI not embedded in core operations","Used in isolated pockets","Supports several core workflows but significant gaps","AI deeply embedded across functions backed by an autonomous business platform"]},
];
const LV=[
  {min:0, max:24,t:"Level 1 — AI Aware",   c:"#DC2626",d:"You understand AI is important but have not built foundations for systematic transformation. The opportunity cost of delay is growing daily."},
  {min:25,max:44,t:"Level 2 — AI Active",  c:"#D97706",d:"You have started your AI journey. The challenge is moving from isolated wins to systematic organisation-wide capability."},
  {min:45,max:64,t:"Level 3 — AI Capable", c:"#2563EB",d:"You have meaningful AI capability. The gap to leaders is in scale, governance maturity, and speed of execution."},
  {min:65,max:79,t:"Level 4 — AI Advanced",c:"#059669",d:"You are in the top quartile of AI maturity. Focus on compound value — AI capabilities that reinforce each other and create defensible advantage."},
  {min:80,max:100,t:"Level 5 — AI Native", c:"#7C3AED",d:"You are operating at the frontier of enterprise AI maturity. Sustaining this position requires continuous innovation as the landscape evolves."},
];
const H={
  strategy:{low:"Define a formal AI strategy and appoint a single executive owner before your next fiscal planning cycle.",mid:"Strengthen your AI use case portfolio process and connect strategy to measurable business outcomes.",high:"Extend your advantage by focusing on agentic platforms and compound AI capabilities."},
  data:{low:"Prioritise data quality and accessibility — AI is only as good as the data it operates on.",mid:"Build toward production-grade MLOps infrastructure. Manual processes become bottlenecks at scale.",high:"Implement AI FinOps practices to sustain cost efficiency as your AI portfolio grows."},
  gov:{low:"EU AI Act enforcement is live. Start with a risk classification of your existing AI portfolio immediately.",mid:"Systematise bias testing and AI security controls. Inconsistent coverage creates unpredictable regulatory exposure.",high:"Publish your AI ethics framework externally — a competitive differentiator for enterprise sales and talent."},
  talent:{low:"Invest in organisation-wide AI literacy before deploying tools. Adoption without capability leads to unused licences.",mid:"Build an AI champions network. Peer influence is more effective than top-down mandates for behavioural change.",high:"Systematise AI talent development to reduce dependency on external hiring in a constrained market."},
  exec:{low:"Get one AI system to production with measurable business impact. One real result is worth 100 PoC demonstrations.",mid:"Standardise your path from idea to deployment. Every week of unnecessary time is competitive disadvantage.",high:"Invest in agentic platform capabilities — the next wave of AI value comes from systems that operate autonomously."},
};

let cur=0,ans=new Array(20).fill(null);
const dl=document.getElementById("dimlist");
dl.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--charcoal);margin-bottom:14px;">Five dimensions measured</div>'+
  D.map(d=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
    <div style="width:8px;height:8px;border-radius:50%;background:${d.c};flex-shrink:0;"></div>
    <span style="font-size:14px;color:var(--charcoal);">${d.name}</span></div>`).join("");

function startQ(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  rQ();
}
function rQ(){
  const q=Q[cur],di=D.findIndex(x=>x.id===q.d),p=Math.round((cur/20)*100);
  document.getElementById("ql").textContent="Question "+(cur+1)+" of 20";
  document.getElementById("qp").textContent=p+"%";
  document.getElementById("pf").style.width=Math.max(2,p)+"%";
  document.getElementById("qdim").textContent=D[di].name;
  document.getElementById("qsub").textContent="Question "+(cur+1)+" of 20";
  document.getElementById("qtxt").textContent=q.q;
  const dd=document.getElementById("dots");dd.innerHTML="";
  D.forEach((d,i)=>{
    const s=i*4,e=s+4,cl=cur>=e?"dn":cur>=s?"act":"";
    dd.innerHTML+=`<div class="dp ${cl}" style="${cl==="dn"?"background:"+d.c+";":cl==="act"?"background:var(--amber);":""}"></div>`;
  });
  const oc=document.getElementById("opts");oc.innerHTML="";
  q.o.forEach((o,i)=>{
    const sel=ans[cur]===i,div=document.createElement("div");
    div.className="opt"+(sel?" sel":"");
    div.innerHTML=`<div class="onum">${i+1}</div><div class="otxt">${o}</div>`;
    div.onclick=()=>selO(i);oc.appendChild(div);
  });
  document.getElementById("bk").style.visibility=cur===0?"hidden":"visible";
  const nx=document.getElementById("nx");nx.disabled=ans[cur]===null;
  if(cur===19){nx.textContent="See My Results";nx.style.background="var(--charcoal)";}
  else{nx.textContent="Next →";nx.style.background="var(--teal)";}
}
function selO(i){
  ans[cur]=i;
  document.querySelectorAll(".opt").forEach((el,j)=>{el.className="opt"+(j===i?" sel":"");});
  document.getElementById("nx").disabled=false;
}
function goNext(){if(ans[cur]===null)return;if(cur===19){showR();return;}cur++;rQ();}
function goPrev(){if(cur>0){cur--;rQ();}}
function showR(){
  document.getElementById("quiz").classList.add("hidden");
  const rs=document.getElementById("results");rs.classList.remove("hidden");
  const ds={};D.forEach(d=>{ds[d.id]={t:0,c:0};});
  Q.forEach((q,i)=>{if(ans[i]!==null){ds[q.d].t+=ans[i]+1;ds[q.d].c++;}});
  const dn={};D.forEach(d=>{const{t,c}=ds[d.id];dn[d.id]=c>0?Math.round((t/(c*4))*20):0;});
  const tot=Object.values(dn).reduce((a,b)=>a+b,0);
  const lv=LV.find(l=>tot>=l.min&&tot<=l.max)||LV[0];
  const dc=D.map(d=>{
    const sc=dn[d.id],p=Math.round((sc/20)*100),tier=p<40?"low":p<70?"mid":"high";
    const bc=p<40?"#DC2626":p<70?"#D97706":"#059669";
    return`<div style="background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:600;color:var(--charcoal);">${d.name}</span>
        <span style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:${d.c};">${sc}/20</span>
      </div>
      <div style="height:4px;background:var(--cream2);border-radius:2px;overflow:hidden;margin-bottom:8px;">
        <div style="height:100%;width:${p}%;background:${bc};border-radius:2px;"></div>
      </div>
      <p style="font-size:12px;color:var(--stone);line-height:1.55;">${H[d.id][tier]}</p>
    </div>`;
  }).join("");
  const sorted=[...D].sort((a,b)=>dn[a.id]-dn[b.id]);
  const rc=sorted.map((d,rank)=>{
    const sc=dn[d.id],p=Math.round((sc/20)*100),tier=p<40?"low":p<70?"mid":"high";
    const pr=rank<2?{l:"NOW",bg:"#FEF2F2",c:"#B91C1C"}:rank<4?{l:"NEXT",bg:"#FFFBEB",c:"#92400E"}:{l:"LATER",bg:"#ECFDF5",c:"#065F46"};
    return`<div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
      <div style="min-width:44px;height:36px;border-radius:6px;background:${pr.bg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${pr.c};flex-shrink:0;">${pr.l}</div>
      <div><div style="font-size:14px;font-weight:600;color:var(--charcoal);margin-bottom:3px;">${d.name} — ${sc}/20</div>
      <div style="font-size:13px;color:var(--stone);line-height:1.55;">${H[d.id][tier]}</div></div>
    </div>`;
  }).join("");
  rs.innerHTML=`
    <div style="background:var(--charcoal);border-radius:var(--rl);padding:44px;text-align:center;margin-bottom:20px;">
      <div style="width:110px;height:110px;border-radius:50%;border:3px solid ${lv.c};display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;">
        <div style="font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#fff;line-height:1;">${tot}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.38);">/100</div>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:${lv.c};margin-bottom:10px;">${lv.t}</div>
      <p style="font-size:15px;color:rgba(255,255,255,.52);max-width:480px;margin:0 auto;line-height:1.7;">${lv.d}</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;">${dc}</div>
    <div style="background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:30px;margin-bottom:20px;">
      <h3 style="font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--charcoal);margin-bottom:20px;">Your Prioritised Action Plan</h3>
      ${rc}
    </div>
    <div style="background:var(--teal);border-radius:var(--rl);padding:36px;text-align:center;">
      <h3 style="font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:#fff;margin-bottom:10px;">Ready to move to the next level?</h3>
      <p style="font-size:14px;color:rgba(255,255,255,.72);margin-bottom:22px;">BigtechConsulting can build a custom transformation roadmap based on your results.</p>
      <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
        <a href="/#contact" style="background:#fff;color:var(--teal);padding:13px 22px;border-radius:var(--r);font-size:14px;font-weight:700;">Book a Free Strategy Call</a>
        <a href="https://startupsinabox.com" target="_blank" style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:13px 22px;border-radius:var(--r);font-size:14px;font-weight:600;">Explore SIXXAB AI &#8594;</a>
      </div>
    </div>`;
}
</script>
</body></html>
